services:
  - type: web
    name: billscan-ocr
    env: python
    buildCommand: pip install -r requirements_server.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OCR_MODEL
        value: easyocr        # hoặc tesseract
      - key: OCR_MODE
        value: contrast       # raw | gray | contrast | binary | background
      - key: OCR_THRESHOLD
        value: "0"
